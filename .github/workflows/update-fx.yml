name: Update FX Rates

on:
  schedule:
    - cron: '0 6 * * *'   # todos los días a las 06:00 UTC
  workflow_dispatch:        # también se puede lanzar manualmente desde GitHub

jobs:
  update-fx:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch FX rates
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-rates.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force public/data/rates.json public/data/history.json
          git diff --cached --quiet || git commit -m "data: FX rates $(date -u +%Y-%m-%d)"
          git push
